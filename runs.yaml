runs:
  base:
    description: "CPU, disco e bateria"
    collectors:
      - cpu
      - disk
      - battery
    processors:
      - log
      - send

  node:
    description: "Nodes de rede (tailscale)"
    collectors:
      - nodes
    processors:
      - log
      - send

  all:
    description: "Tudo"
    include:
      - base
      - node